<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego | Piedra, papel y tijera </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="page">
  <header class="header">
    <h1 class="header__title">Juego de piedra, papel o tijera</h1>
  </header>

  <main class="main">
    <section class="game">
      <h2 class="game__title">Introduce aquí tu jugada</h2>

      <form class="game__form js-form">
        <label for="move" class="game__label">Selecciona tu jugada</label>

        <select id="move" class="game__select js-selectMove">
          <option value="piedra">Piedra</option>
          <option value="papel">Papel</option>
          <option value="tijera">Tijera</option>
        </select>

        <button class="game__btn js-btnPlay" type="button">
          Jugar
        </button>

        <button class="game__btn game__btn--restart js-btnRestart hidden" type="button">
          Reiniciar juego
        </button>
      </form>
    </section>

    <section class="result js-result hidden">
      <h2 class="result__title">Resultado</h2>
      <p class="result__text js-resultParagraph">¡Vamos a jugar!</p>
      <p class="result__rounds">
        Jugadas <span class="js-roundCounter">0</span> / 10
      </p>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__score">
      Jugadora: <span class="js-userScore">0</span>
    </p>
    <p class="footer__score">
      Ordenador: <span class="js-computerScore">0</span>
    </p>

    <p class="footer__copy">
        &copy;<span class="js-year"></span> Juego de Adalab | Leti
    </p>
  </footer>

  <script src="./js/main.js"></script>
</body>
</html>
